name: Daily Event Scraper

on:
  schedule:
    # 22:00 UTC = 한국 시간 오전 7시
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Playwright 브라우저 캐시 확인
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-v2-${{ hashFiles('backend/requirements.txt') }}

      - name: 패키지 설치
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Playwright 시스템 종속성 및 브라우저 설치
        run: |
          python -m playwright install chromium --with-deps
          
      - name: 스크래핑 및 Supabase 푸시 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd backend
          python scraper.py

      - name: 공모주(IPO) 일정 스크래핑
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd backend
          python ipo_scraper.py

      - name: 아파트(APT) 청약 일정 스크래핑
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd backend
          python apt_scraper.py

      - name: 시장 및 고래 인사이트 분석 및 갱신
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          cd backend
          python analyze_market.py
          python whale_scraper.py
